services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── vLLM: Qwen3.5-9B ──────────────────────────────────────────────────────
  # Context window sized for multi-agent orchestrator (system prompts + event payloads).
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8002:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_VISIBLE_DEVICES=0
    command:
      - "Qwen/Qwen3.5-9B"
      - "--trust-remote-code"
      - "--dtype"
      - "bfloat16"
      - "--gpu-memory-utilization"
      - "0.75"
      - "--max-model-len"
      - "16384"
      - "--max-num-seqs"
      - "4"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--reasoning-parser"
      - "qwen3"
      - "--default-chat-template-kwargs"
      - '{"enable_thinking": false}'
      - "--enforce-eager"
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  api:
    build: .
    container_name: api
    # CMD definido en start.sh (lanza Xvfb + uvicorn)
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - DISPLAY=:99
      - EDGE_PUBLIC_URL=${EDGE_PUBLIC_URL:-http://localhost:8000}
      - MOTHERSHIP_API_URL=${MOTHERSHIP_API_URL:-http://localhost:8001}
    shm_size: '256mb'
    volumes:
      - ./app:/app/app
      - ./tmp:/tmp
      - hf_cache:/root/.cache/huggingface
      - chromium_profile:/tmp/chromium-profile
      - omniparser_weights:/omniparser/weights
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_started
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
    name: minio-data
  qdrant_data:
    name: qdrant-data
  hf_cache:
    name: hf-cache
  postgres_data:
    name: postgres-data
  chromium_profile:
    name: chromium-profile # Perfil Chromium persistente — pre-autenticar aqui para evitar Google bot detection
  omniparser_weights:
    name: omniparser-weights # Descargar con: docker compose exec api huggingface-cli download microsoft/OmniParser-v2.0 --local-dir /omniparser/weights
