services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest # latest includes native Qwen3.5 + qwen3_xml tool call parser
    container_name: vllm
    ports:
      - "8002:8000"
    environment:
      # Requerido para carga dinámica de LoRA en runtime (POST /v1/load_lora_adapter)
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
    command:
      - "--model"
      - "Qwen/Qwen3.5-2B"
      - "--enable-lora"
      - "--max-loras"
      - "4"
      - "--max-lora-rank"
      - "16"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--max-model-len"
      - "4096"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_xml"
    volumes:
      - ./loras:/loras
      - hf_cache:/root/.cache/huggingface
    ipc: host # Required by vLLM: prevents shared memory errors during GPU tensor inference
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s  # vLLM needs ~2-3 min for model load + CUDA graph warmup
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  api:
    build: .
    container_name: api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
    volumes:
      - ./app:/app/app
      - ./tmp:/tmp
      - ./loras:/loras # Shared with vLLM — OTA service extracts adapters here
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
    name: minio-data
  qdrant_data:
    name: qdrant-data
  hf_cache:
    name: hf-cache
  postgres_data:
    name: postgres-data
