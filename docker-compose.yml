services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  vllm-sistema1:
    image: vllm/vllm-openai:latest # latest includes native Qwen3.5 + qwen3_xml tool call parser
    container_name: vllm-sistema1
    ports:
      - "8002:8000"
    # Wait for orchestrator to be healthy before starting (sequential startup to avoid GPU contention)
    depends_on:
      vllm-orchestrator:
        condition: service_healthy
    environment:
      # Requerido para carga dinámica de LoRA en runtime (POST /v1/load_lora_adapter)
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
      # GPU 0 para este servicio (VL + LoRA). Si solo tienes 1 GPU, ambos comparten GPU 0.
      # Con 2 GPUs: poner GPU_DEVICE_ORDINAL=0 aqui y =1 en vllm-orchestrator.
      - CUDA_VISIBLE_DEVICES=0
    command:
      # Modelo como argumento posicional (formato vLLM >= 0.13)
      - "Qwen/Qwen3.5-9B"
      - "--trust-remote-code"
      - "--dtype"
      - "float16"
      - "--enable-lora"
      - "--max-loras"
      - "4"
      - "--max-lora-rank"
      - "16"
      # enforce-eager REMOVIDO: degradaba throughput 5-15%. CUDA Graphs activos = mejor decode.
      - "--enable-prefix-caching"  # KV-cache reuse del system prompt entre requests del mismo agente
      - "--enable-chunked-prefill"  # Interleave prefill/decode: mejora ITL en multi-request
      - "--gpu-memory-utilization"
      - "0.50"  # Subido de 0.45: recuperamos ~1.5GB que enforce-eager forzaba a reservar
      - "--max-model-len"
      - "12288"  # Bajado de 16384: agentes no usan 16K. Reducir = más KV cache disponible.
      - "--mm-processor-cache-gb"  # Cache de procesamiento multimodal
      - "2"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_xml"
      - "--max-num-seqs"
      - "4"  # Edge single-user: limita concurrencia para priorizar latencia vs throughput
    volumes:
      - ./loras:/loras
      - hf_cache:/root/.cache/huggingface
    ipc: host # Required by vLLM: prevents shared memory errors during GPU tensor inference
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 240s  # Qwen3.5-9B necesita ~3-4 min para carga de pesos (18GB) + warmup
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  vllm-orchestrator:
    image: vllm/vllm-openai:latest
    container_name: vllm-orchestrator
    ports:
      - "8003:8000"
    environment:
      # Si tienes 2 GPUs: cambiar a CUDA_VISIBLE_DEVICES=1 para aislar de vllm-sistema1
      # Si solo 1 GPU: dejar en 0 (ambos comparten) y reducir utilization a 0.40
      - CUDA_VISIBLE_DEVICES=0
      # VLLM_USE_V1=0 ya no tiene efecto en vLLM >= 0.8 (V0 fue eliminado permanentemente)
    command:
      - "Qwen/Qwen3.5-9B"
      - "--trust-remote-code"
      - "--dtype"
      - "float16"
      - "--enable-prefix-caching"  # CRÍTICO: el mismo system prompt se envía en cada request
      - "--enable-chunked-prefill"  # Mejor scheduling de prefill + decode en paralelo
      - "--gpu-memory-utilization"
      - "0.48"  # Subido ligeramente de 0.45
      - "--max-model-len"
      - "10240"  # Bajado de 16384: el orquestador hace routing corto, nunca usa 16K
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_xml"
      - "--max-num-seqs"
      - "4"  # Edge single-user: prioriza latencia
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  api:
    build: .
    container_name: api
    # CMD definido en start.sh (lanza Xvfb + uvicorn)
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm-sistema1:8000/v1
      - VLLM_ORCHESTRATOR_URL=http://vllm-orchestrator:8000/v1
      - DISPLAY=:99  # Display virtual de Xvfb (Computer Use Agent)
      # ⚠️ PRODUCCIÓN: URL pública del Edge para que ApiLLMOps envíe el webhook OTA de regreso.
      # Como ambas apps corren en el mismo servidor, usar la IP pública (no localhost — no resuelve entre stacks Docker).
      - EDGE_PUBLIC_URL=${EDGE_PUBLIC_URL:-http://69.19.136.193:8000}
      # URL de la Mothership (ApiLLMOps) accesible desde dentro de este container.
      # Puerto 8001 = puerto público del mops-api en el servidor.
      - MOTHERSHIP_API_URL=${MOTHERSHIP_API_URL:-http://38.128.233.165:8001}
    # Chromium necesita al menos 256MB de shared memory para no crashear
    shm_size: '256mb'
    volumes:
      - ./app:/app/app
      - ./tmp:/tmp
      - ./loras:/loras # Shared with vLLM — OTA service extracts adapters here
      - hf_cache:/root/.cache/huggingface
      - chromium_profile:/tmp/chromium-profile  # Perfil Chromium persistente: cookies/sesiones sobreviven reinicios
      - omniparser_weights:/omniparser/weights    # OmniParser V2 weights (YOLO icon_detect + Florence-2 icon_caption)
    restart: unless-stopped
    depends_on:
      vllm-sistema1:
        condition: service_healthy
      vllm-orchestrator:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
    name: minio-data
  qdrant_data:
    name: qdrant-data
  hf_cache:
    name: hf-cache
  postgres_data:
    name: postgres-data
  chromium_profile:
    name: chromium-profile  # Perfil Chromium persistente — pre-autenticar aqui para evitar Google bot detection
  omniparser_weights:
    name: omniparser-weights  # Descargar con: docker compose exec api huggingface-cli download microsoft/OmniParser-v2.0 --local-dir /omniparser/weights
