services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Unified vLLM: Gemma 4 26B-A4B (MoE) ──────────────────────────────────
  # Replaces the previous dual-container setup (vllm-orchestrator + vllm-sistema1).
  # Single MoE backbone serves both the Orchestrator (base model) and subagents (via LoRA).
  # Gemma 4 26B-A4B: 26B total params, ~4B active per token. Native multimodal + tool calling.
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8002:8000"
    environment:
      # Required for dynamic OTA LoRA loading at runtime (POST /v1/load_lora_adapter)
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
      - CUDA_VISIBLE_DEVICES=0
    command:
      # Gemma 4 26B-A4B (MoE) — Apache 2.0, 256K context, native vision + tool calling
      - "google/gemma-4-26b-a4b-it-awq" # CRÍTICO: Debe ser un repo pre-cuantizado en HF para que AWQ funcione
      - "--trust-remote-code"
      - "--dtype"
      - "float16"
      - "--quantization"
      - "awq"
      - "--enable-lora"
      - "--max-loras"
      - "4"
      - "--max-lora-rank"
      - "16"
      - "--enable-prefix-caching"   # KV-cache reuse for system prompts across agent requests
      - "--enable-chunked-prefill"  # Interleave prefill/decode for better ITL
      - "--gpu-memory-utilization"
      - "0.90"  # No more contention — single container owns full GPU
      - "--max-model-len"
      - "16384"  # MoE uses less KV per token; 16K is comfortable
      # Gemma 4 native tool calling parser (replaces qwen3_xml)
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "gemma4"
      - "--max-num-seqs"
      - "4"  # Edge single-user: prioritize latency over throughput
      # Multimodal: limit images per prompt to control VRAM for vision encoder
      - "--limit-mm-per-prompt"
      - '{"image": 4}'
    volumes:
      - ./loras:/loras
      - hf_cache:/root/.cache/huggingface
    ipc: host  # Required by vLLM: prevents shared memory errors during GPU tensor inference
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 420s  # Gemma 4 26B MoE: ~7 min for weight loading + warmup
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  api:
    build: .
    container_name: api
    # CMD definido en start.sh (lanza Xvfb + uvicorn)
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Unified vLLM endpoint — single MoE container serves all agents
      - VLLM_BASE_URL=http://vllm:8000/v1
      - DISPLAY=:99  # Display virtual de Xvfb (Computer Use Agent)
      # ⚠️ PRODUCCIÓN: URL pública del Edge para que ApiLLMOps envíe el webhook OTA de regreso.
      - EDGE_PUBLIC_URL=${EDGE_PUBLIC_URL:-http://69.19.136.193:8000}
      # URL de la Mothership (ApiLLMOps) accesible desde dentro de este container.
      - MOTHERSHIP_API_URL=${MOTHERSHIP_API_URL:-http://38.128.233.165:8001}
    # Chromium necesita al menos 256MB de shared memory para no crashear
    shm_size: '256mb'
    volumes:
      - ./app:/app/app
      - ./tmp:/tmp
      - ./loras:/loras # Shared with vLLM — OTA service extracts adapters here
      - hf_cache:/root/.cache/huggingface
      - chromium_profile:/tmp/chromium-profile
      - omniparser_weights:/omniparser/weights
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
    name: minio-data
  qdrant_data:
    name: qdrant-data
  hf_cache:
    name: hf-cache
  postgres_data:
    name: postgres-data
  chromium_profile:
    name: chromium-profile  # Perfil Chromium persistente — pre-autenticar aqui para evitar Google bot detection
  omniparser_weights:
    name: omniparser-weights  # Descargar con: docker compose exec api huggingface-cli download microsoft/OmniParser-v2.0 --local-dir /omniparser/weights
