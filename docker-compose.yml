services:

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  ollama-pull:
    image: curlimages/curl:latest
    container_name: ollama-pull
    depends_on:
      - ollama
    command: >
      sh -c '
        echo "Waiting for Ollama to be ready..."
        while ! curl -s http://ollama:11434/api/tags > /dev/null; do
          sleep 2
        done
        echo "Ollama is ready! Pulling qwen3.5:9b model..."
        curl -X POST http://ollama:11434/api/pull -d "{\"name\": \"qwen3.5:9b\"}"
        echo "Pulling nomic-embed-text model for embeddings..."
        curl -X POST http://ollama:11434/api/pull -d "{\"name\": \"nomic-embed-text\"}"
        echo "Pull complete."
      '

  api:
    build: .
    container_name: api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./app:/app/app
      - ./tmp:/tmp
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  minio_data:
    name: minio-data
  qdrant_data:
    name: qdrant-data
  hf_cache:
    name: hf-cache
  postgres_data:
    name: postgres-data
  ollama_data:
    name: ollama-data
